# Cilium Ingress は loadbalancerMode: shared のため、同一 host への複数 Ingress は
# 同じ Envoy listener にマージされる。chaos-monitor-grafana は実体(IP)を持つ本 namespace に
# backend を置き、他リポジトリからは ExternalName 越しに参照するだけにする。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chaos-monitor-ingress
  annotations:
    cert-manager.io/cluster-issuer: "ca-clusterissuer"
spec:
  ingressClassName: cilium
  tls:
  - hosts:
    - monitoring.cluster.wpc
    secretName: chaos-monitor-tls-secret
  rules:
  - host: monitoring.cluster.wpc
    http:
      paths:
      - path: /chaos-monitor
        pathType: Prefix
        backend:
          service:
            name: chaos-monitor-grafana
            port:
              number: 3000
