apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-leaderelection-fix
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-controller-leaderelection-fix
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  kind: ClusterRole
  name: cert-manager-leaderelection-fix
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-cainjector-leaderelection-fix
subjects:
  - kind: ServiceAccount
    name: cert-manager-cainjector
    namespace: cert-manager
roleRef:
  kind: ClusterRole
  name: cert-manager-leaderelection-fix
  apiGroup: rbac.authorization.k8s.io
