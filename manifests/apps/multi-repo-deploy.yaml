apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-repo-deploy
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - appName: bare-web-proxy
        url: https://github.com/k-wa-wa/bare-web-proxy
        revision: HEAD
      - appName: nuage-monitoring-stack
        url: https://github.com/k-wa-wa/nuage-monitoring-stack
        revision: HEAD
      - appName: pechka
        url: https://github.com/k-wa-wa/pechka.git
        revision: HEAD
  template:
    metadata:
      name: '{{appName}}-app'
    spec:
      project: default
      source:
        repoURL: '{{url}}'
        targetRevision: '{{revision}}'
        path: k8s/overlays/prod
        plugin:
          name: argocd-vault-plugin-kustomize
          # プラグイン側の処理モードを sops に指定
          env:
            - name: AVP_TYPE
              value: sops
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{appName}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
