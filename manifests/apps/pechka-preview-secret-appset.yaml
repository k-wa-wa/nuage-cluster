# pechka-preview-appset.yaml (k8s/overlays/preview) とは別のApplicationとして、
# 同じ namespace (pechka-pr-<N>) に postgres-seed-secret という Secret オブジェクト**だけ**を配置する。
#
# ここだけ argocd-vault-plugin-kustomize を使う (manifests/apps/multi-repo-deploy.yaml が
# prodで使っているのと全く同じ形。ArgoCDのCMP設定 (avp-cmp-plugin.yaml) には一切手を加えていない)。
# pluginを使うApplicationの中身をSecretオブジェクト1個だけに絞ることで、
# native kustomizeのnamespace/images上書きとpluginの併用問題を避けつつ、影響範囲を最小化している。
#
# k8s/overlays/preview 側の postgres-seed-from-prod Job が、このSecretを
# 同一namespace内の secretKeyRef で参照して prod からの初期データコピーに使う。
#
# PR が close/merge されると自動でこのApplicationも削除され、Secretが消える。
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pechka-preview-secret
  namespace: argocd
spec:
  generators:
  - pullRequest:
      github:
        owner: k-wa-wa
        repo: pechka
        tokenRef:
          secretName: pechka-preview-github-token
          key: token
      requeueAfterSeconds: 180
  template:
    metadata:
      name: 'pechka-pr-{{number}}-secret'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/k-wa-wa/pechka.git
        targetRevision: '{{head_sha}}'
        path: k8s/overlays/preview-secret
        plugin:
          name: argocd-vault-plugin-kustomize
          env:
            - name: AVP_TYPE
              value: sops
      destination:
        server: https://kubernetes.default.svc
        namespace: 'pechka-pr-{{number}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
