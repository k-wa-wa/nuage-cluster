# Managed by SealedSecrets. Replace with sealed values before applying.
# Required keys: POSTGRES_DSN, MONGO_URL, ELASTICSEARCH_URL
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: benthos-secret
  namespace: pechka
spec:
  encryptedData:
    POSTGRES_DSN: REPLACE_WITH_SEALED_VALUE
    MONGO_URL: REPLACE_WITH_SEALED_VALUE
    ELASTICSEARCH_URL: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: benthos-secret
      namespace: pechka
    type: Opaque
