apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
- default-project.yaml
- avp-cmp-plugin.yaml

patches:
- target:
    kind: ConfigMap
    name: argocd-cm
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: argocd-cm
    data:
      kustomize.buildOptions: "--enable-helm"

      # Cilium Ingress が NodePort 構成になっており、外部のロードバランサー (HAProxy) から
      # 直接各ノードの NodePort (30080/30443) へ転送されるため、Ingress に LoadBalancer IP は割り当てられません。
      # ArgoCD が Ingress に外部 IP が設定されるまで Progressing のままになるのを防ぐため、
      # 外部 IP チェックをスキップして Healthy と判定するようカスタマイズします。
      resource.customizations.health.networking.k8s.io_Ingress: |
        hs = {}
        if obj.metadata.deletionTimestamp ~= nil then
          hs.status = "Progressing"
          hs.message = "The ingress is being deleted"
          return hs
        end
        hs.status = "Healthy"
        return hs

      resource.exclusions: |
        ### discovery.k8s.io/EndpointSlice は pg-cluster で手動管理する EndpointSlice を ArgoCD の管理対象とするため除外対象から外す。
        ### resource.inclusions を使用すると他の全リソースが暗黙的に除外されるため、exclusions から除外することで対応する。
        ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
        - apiGroups:
          - ''
          kinds:
          - Endpoints
        ### Internal Kubernetes resources excluded reduce the number of watched events
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        ### Intermediate Certificate Request excluded reduce the number of watched events
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
        - apiGroups:
          - cilium.io
          kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
        ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest

- target:
    kind: ConfigMap
    name: argocd-cmd-params-cm
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: argocd-cmd-params-cm
    data:
      server.insecure: "true"

- target:
    kind: Deployment
    name: argocd-repo-server
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-repo-server
    spec:
      template:
        spec:
          initContainers:
            - name: download-avp
              image: alpine:3.18
              command: ["sh", "-c"]
              args:
                - |
                  wget -O /custom-tools/argocd-vault-plugin https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/v1.18.1/argocd-vault-plugin_1.18.1_linux_amd64
                  chmod +x /custom-tools/argocd-vault-plugin
              volumeMounts:
                - name: custom-tools
                  mountPath: /custom-tools
          # ─────────────────────────────────────────────────────────────
          containers:
            - name: argocd-vault-plugin-kustomize
              # AVP実行環境には、kustomizeやgitが元から入っているArgo CD公式イメージを使います
              image: quay.io/argoproj/argocd:v3.4.4
              command: [/var/run/argocd/argocd-cmp-server]
              env:
                - name: AVP_TYPE
                  value: sops
                - name: SOPS_AGE_KEY_FILE
                  value: /home/argocd/.config/sops/age/keys.txt
                # ダウンロードしたバイナリにパスを通す
                - name: PATH
                  value: /usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/custom-tools
              volumeMounts:
                - name: var-files
                  mountPath: /var/run/argocd
                - name: plugins
                  mountPath: /home/argocd/cmp-server/plugins
                - name: cmp-plugin
                  mountPath: /home/argocd/cmp-server/config/plugin.yaml
                  subPath: kustomize-avp.yaml
                - name: sops-age-key
                  mountPath: /home/argocd/.config/sops/age
                # バイナリが置かれた共有ボリュームをマウント
                - name: custom-tools
                  mountPath: /custom-tools
          volumes:
            - name: cmp-plugin
              configMap:
                name: cmp-plugin
            - name: sops-age-key
              secret:
                secretName: sops-age-key
                items:
                  - key: keys.txt
                    path: keys.txt
            # 共有ボリュームの定義
            - name: custom-tools
              emptyDir: {}
