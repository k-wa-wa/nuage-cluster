apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  subscriptions: |
    - recipients:
        - pwa
      triggers:
        - on-deployed
        - on-sync-failed

  service.webhook.pwa: |
    url: http://monitoring-pwa-backend.nuage-monitoring-stack.svc.cluster.local/webhook/generic
    headers:
      - name: Content-Type
        value: application/json


  trigger.on-deployed: |
    - when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send:
        - app-deployed
  trigger.on-sync-failed: |
    - when: app.status.operationState != nil and app.status.operationState.phase in ['Failed', 'Error']
      send:
        - app-sync-failed
  template.app-deployed: |
    webhook:
      pwa:
        method: POST
        body: |
          {"title": "[ArgoCD] {{.app.metadata.name}} デプロイ完了", "body": "Syncが完了した。"}
  template.app-sync-failed: |
    webhook:
      pwa:
        method: POST
        body: |
          {"title": "[ArgoCD] {{.app.metadata.name}} Sync失敗", "body": "Syncに失敗した。"}
