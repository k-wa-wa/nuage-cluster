apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-announcement-policy
spec:
  nodeSelector:
    matchLabels: {} # すべてのノードを対象
  interfaces:
    - "ens18"
  serviceSelector:
    matchLabels: {} # すべてのLB Serviceを対象
  loadBalancerIPs: true
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: internal-lb-pool
spec:
  blocks:
    - start: "10.10.1.200"
      stop: "10.10.1.250"
