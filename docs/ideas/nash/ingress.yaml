apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nash-ingress
  namespace: ops
  annotations:
    cert-manager.io/cluster-issuer: "ca-clusterissuer"
spec:
  ingressClassName: cilium
  tls:
  - hosts:
    - nash.cluster.wpc
    secretName: nash-tls-secret
  rules:
  - host: nash.cluster.wpc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nash
            port:
              number: 80
