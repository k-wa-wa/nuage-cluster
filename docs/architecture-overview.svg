<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840">
  <defs>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#b0b0b0"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#7ea6d8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="840" rx="10" fill="#121212"/>

  <g font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif">

    <!-- ===== 外部 (最上段) ===== -->
    <rect x="48" y="36" width="140" height="48" rx="6" fill="#2b2b2b" stroke="#999999"/>
    <text x="118" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#e8e8e8">Internet</text>

    <rect x="248" y="36" width="280" height="48" rx="6" fill="#2b2b2b" stroke="#999999"/>
    <text x="388" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#e8e8e8">自宅 LAN</text>
    <text x="388" y="74" text-anchor="middle" font-size="11" fill="#b0b0b0">ONU / Omada ルーター / L2 スイッチ</text>

    <rect x="568" y="36" width="200" height="48" rx="6" fill="#2b2b2b" stroke="#999999"/>
    <text x="668" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#e8e8e8">Tailscale</text>
    <text x="668" y="74" text-anchor="middle" font-size="11" fill="#b0b0b0">拠点間 / リモート VPN</text>

    <rect x="800" y="36" width="260" height="48" rx="6" fill="#3a2a14" stroke="#d79b00"/>
    <text x="930" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#e8e8e8">Cloudflare Tunnel</text>
    <text x="930" y="74" text-anchor="middle" font-size="11" fill="#b0b0b0">Zero Trust — インバウンド公開</text>

    <!-- 外部の接続線 -->
    <line x1="188" y1="60" x2="244" y2="60" stroke="#b0b0b0" marker-end="url(#arrGray)" marker-start="url(#arrGray)"/>
    <line x1="568" y1="60" x2="532" y2="60" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <path d="M118,36 V16 H930 V32" fill="none" stroke="#b0b0b0" marker-end="url(#arrGray)"/>

    <!-- LAN → Proxmox (インバウンド) / SNAT (アウトバウンド) -->
    <line x1="300" y1="84" x2="300" y2="146" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <text x="308" y="122" font-size="11" fill="#b0b0b0">https / kubectl (VIP 経由)</text>
    <line x1="480" y1="150" x2="480" y2="88" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <text x="488" y="122" font-size="11" fill="#b0b0b0">SNAT (アウトバウンド)</text>
    <line x1="850" y1="84" x2="850" y2="281" stroke="#b0b0b0" marker-end="url(#arrGray)"/>

    <!-- ===== Proxmox VE クラスター ===== -->
    <rect x="48" y="150" width="1184" height="410" rx="8" fill="#1a1a1a" stroke="#999999" stroke-width="1.2"/>
    <text x="68" y="176" font-size="14" font-weight="bold" fill="#e8e8e8">Proxmox VE クラスター — 仮想化基盤</text>
    <text x="380" y="176" font-size="11" fill="#b0b0b0">物理ノード数台 + 通常時停止の予備機 / 各ノード 3 系統 NIC (管理 LAN・SDN Fabric・予備)</text>

    <!-- Proxmox SDN -->
    <rect x="72" y="200" width="880" height="330" rx="8" fill="#15202b" stroke="#6c8ebf"/>
    <text x="88" y="224" font-size="13" font-weight="bold" fill="#e8e8e8">Proxmox SDN — BGP EVPN / VXLAN オーバーレイ</text>
    <text x="430" y="224" font-size="11" fill="#b0b0b0">アンダーレイ: OSPF Fabric</text>

    <!-- zone: private -->
    <rect x="92" y="244" width="840" height="256" rx="8" fill="#1a2c42" stroke="#6c8ebf" stroke-dasharray="6 4"/>
    <text x="108" y="266" font-size="12" font-weight="bold" fill="#e8e8e8">zone: private (VRF 分離 / SNAT で外部へ)</text>
    <text x="108" y="518" font-size="11" fill="#b0b0b0">※ テナント・用途ごとに EVPN ゾーン / VNet を追加払い出し可能</text>

    <!-- ロードバランサー -->
    <rect x="108" y="300" width="200" height="120" rx="6" fill="#46390f" stroke="#d6b656"/>
    <text x="120" y="322" font-size="13" font-weight="bold" fill="#e8e8e8">ロードバランサー <tspan font-size="11" font-weight="normal" fill="#b0b0b0">NixOS LXC</tspan></text>
    <text x="120" y="348" font-size="12" fill="#e8e8e8">HAProxy — TCP パススルー</text>
    <text x="120" y="370" font-size="12" fill="#e8e8e8">keepalived — VIP 冗長化</text>
    <text x="120" y="392" font-size="12" fill="#e8e8e8">CoreDNS — *.cluster.wpc</text>

    <!-- Kubernetes -->
    <rect x="352" y="290" width="330" height="190" rx="6" fill="#1e3d24" stroke="#82b366"/>
    <text x="368" y="314" font-size="14" font-weight="bold" fill="#e8e8e8">Kubernetes — Talos Linux</text>
    <text x="368" y="342" font-size="12" fill="#e8e8e8">Control Plane / Worker (VM)</text>
    <text x="368" y="364" font-size="12" fill="#e8e8e8">Cilium — CNI / kube-proxy 置換 / Ingress</text>
    <text x="368" y="386" font-size="12" fill="#e8e8e8">Argo CD — GitOps (ApplicationSet)</text>
    <text x="368" y="408" font-size="12" fill="#e8e8e8">Apps: monitoring / cert-manager …</text>
    <text x="368" y="430" font-size="12" fill="#e8e8e8">local-path-provisioner — 動的 PV</text>

    <!-- cloudflared / データストア -->
    <rect x="726" y="285" width="192" height="36" rx="6" fill="#262626" stroke="#999999"/>
    <text x="822" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#e8e8e8">cloudflared (VM)</text>

    <rect x="726" y="345" width="192" height="135" rx="6" fill="#4a3118" stroke="#d79b00"/>
    <text x="738" y="369" font-size="13" font-weight="bold" fill="#e8e8e8">データストア <tspan font-size="11" font-weight="normal" fill="#b0b0b0">クラスター外</tspan></text>
    <text x="738" y="397" font-size="12" fill="#e8e8e8">PostgreSQL (LXC)</text>
    <text x="738" y="419" font-size="12" fill="#e8e8e8">NFS — nfs-proxy 中継</text>
    <text x="738" y="441" font-size="12" fill="#e8e8e8">Minio (S3 互換)</text>

    <!-- zone 内の接続 -->
    <line x1="308" y1="364" x2="348" y2="364" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <line x1="682" y1="412" x2="722" y2="412" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <line x1="726" y1="303" x2="688" y2="303" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <path d="M918,419 H948 V262 H986" fill="none" stroke="#b0b0b0" marker-end="url(#arrGray)"/>

    <!-- 管理 LAN 上の VM -->
    <rect x="976" y="200" width="232" height="330" rx="8" fill="#1f1f1f" stroke="#888888"/>
    <text x="992" y="224" font-size="13" font-weight="bold" fill="#e8e8e8">管理 LAN 上の VM</text>

    <rect x="992" y="240" width="200" height="44" rx="4" fill="#2b2b2b" stroke="#777777"/>
    <text x="1002" y="258" font-size="12" font-weight="bold" fill="#e8e8e8">oc1-nfs</text>
    <text x="1002" y="274" font-size="11" fill="#b0b0b0">NFS サーバー</text>

    <rect x="992" y="296" width="200" height="44" rx="4" fill="#2b2b2b" stroke="#777777"/>
    <text x="1002" y="314" font-size="12" font-weight="bold" fill="#e8e8e8">dev-server</text>
    <text x="1002" y="330" font-size="11" fill="#b0b0b0">NixOS 開発サーバー</text>

    <rect x="992" y="352" width="200" height="44" rx="4" fill="#2b2b2b" stroke="#777777"/>
    <text x="1002" y="370" font-size="12" font-weight="bold" fill="#e8e8e8">lm-server</text>
    <text x="1002" y="386" font-size="11" fill="#b0b0b0">Ollama — 予備機で稼働</text>

    <rect x="992" y="408" width="200" height="44" rx="4" fill="#2b2b2b" stroke="#777777"/>
    <text x="1002" y="426" font-size="12" font-weight="bold" fill="#e8e8e8">Omada Controller</text>
    <text x="1002" y="442" font-size="11" fill="#b0b0b0">ネットワーク管理</text>

    <text x="992" y="508" font-size="11" fill="#b0b0b0">SDN 外 / vmbr0 直結</text>

    <!-- ===== 管理レイヤー (IaC / GitOps) ===== -->
    <rect x="48" y="600" width="1184" height="208" rx="8" fill="#191919" stroke="#444444"/>
    <text x="1212" y="626" text-anchor="end" font-size="13" font-weight="bold" fill="#e8e8e8">管理レイヤー — IaC / GitOps</text>

    <!-- ①②③ の適用フロー -->
    <line x1="200" y1="692" x2="200" y2="566" stroke="#7ea6d8" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
    <text x="210" y="636" font-size="12" font-weight="bold" fill="#e8e8e8">① インフラ層 — Terragrunt + OpenTofu</text>
    <text x="210" y="654" font-size="11" fill="#b0b0b0">SDN・VM・LXC・Talos を手動 apply</text>

    <line x1="560" y1="692" x2="560" y2="566" stroke="#7ea6d8" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
    <text x="570" y="636" font-size="12" font-weight="bold" fill="#e8e8e8">② OS 層 — Nix Flake</text>
    <text x="570" y="654" font-size="11" fill="#b0b0b0">NixOS ホストが自動 pull (autoUpgrade)</text>

    <line x1="800" y1="692" x2="800" y2="566" stroke="#7ea6d8" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
    <text x="810" y="636" font-size="12" font-weight="bold" fill="#e8e8e8">③ アプリ層 — Argo CD</text>
    <text x="810" y="654" font-size="11" fill="#b0b0b0">master へ push で自動同期</text>

    <!-- 管理者 PC / GitHub -->
    <rect x="112" y="692" width="250" height="88" rx="6" fill="#2b2b2b" stroke="#999999"/>
    <text x="128" y="716" font-size="13" font-weight="bold" fill="#e8e8e8">管理者 PC</text>
    <text x="128" y="740" font-size="11.5" fill="#e8e8e8">SOPS + Age マスターキー保持</text>
    <text x="128" y="760" font-size="11.5" fill="#e8e8e8">terragrunt / kubectl / talosctl</text>

    <rect x="520" y="692" width="340" height="88" rx="6" fill="#2b2b2b" stroke="#999999"/>
    <text x="536" y="716" font-size="13" font-weight="bold" fill="#e8e8e8">GitHub — k-wa-wa/nuage-cluster</text>
    <text x="536" y="740" font-size="11.5" fill="#e8e8e8">terraform/ · nix/ · manifests/ を管理</text>
    <text x="536" y="760" font-size="11.5" fill="#e8e8e8">Actions: NixOS LXC イメージビルド</text>

    <line x1="362" y1="736" x2="516" y2="736" stroke="#7ea6d8" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
    <text x="439" y="726" text-anchor="middle" font-size="11" fill="#7ea6d8">git push</text>

    <!-- 凡例 -->
    <line x1="1000" y1="744" x2="1030" y2="744" stroke="#b0b0b0" marker-end="url(#arrGray)"/>
    <text x="1040" y="748" font-size="11" fill="#b0b0b0">トラフィック</text>
    <line x1="1000" y1="766" x2="1030" y2="766" stroke="#7ea6d8" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
    <text x="1040" y="770" font-size="11" fill="#b0b0b0">管理 / 同期 (IaC・GitOps)</text>

  </g>
</svg>
