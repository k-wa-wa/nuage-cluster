apiVersion: v1
kind: ServiceAccount
metadata:
  name: trigger-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trigger-service-job-creator
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trigger-service-job-creator
subjects:
- kind: ServiceAccount
  name: trigger-service
roleRef:
  kind: Role
  name: trigger-service-job-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trigger-service
  labels:
    app: trigger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trigger-service
  template:
    metadata:
      labels:
        app: trigger-service
    spec:
      serviceAccountName: trigger-service
      containers:
      - name: trigger-service
        image: trigger-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5054
        env:
        - name: AI_SERVICE_ADDRESS
          value: ai-service:80
        - name: REPORT_SERVICE_ADDRESS
          value: report-service:80
---
apiVersion: v1
kind: Service
metadata:
  name: trigger-service
spec:
  selector:
    app: trigger-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5054
  type: ClusterIP
