apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
data:
  001_create_user_profiles_table.sql: |
    CREATE TABLE IF NOT EXISTS user_profiles (
        user_id VARCHAR(255) PRIMARY KEY,
        display_name VARCHAR(255)
    );
  002_create_user_notification_settings_table.sql: |
    CREATE TABLE IF NOT EXISTS user_notification_settings (
        id SERIAL PRIMARY KEY,
        user_id VARCHAR(255) NOT NULL,
        setting_key VARCHAR(255) NOT NULL,
        setting_value TEXT,
        CONSTRAINT fk_user_id
            FOREIGN KEY (user_id)
            REFERENCES user_profiles (user_id)
            ON DELETE CASCADE
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: userdb
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        volumeMounts:
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: init-sql
        configMap:
          name: postgres-init-sql
      - name: pgdata
        emptyDir: {}
---
# ExternalName service "postgres" in this namespace points to this service.
apiVersion: v1
kind: Service
metadata:
  name: postgres-postgresql
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
