apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-role
rules:
# argoexec がPodにステータスをパッチするために必要
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "patch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-binding
subjects:
- kind: ServiceAccount
  name: argo-workflow
roleRef:
  kind: Role
  name: argo-workflow-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ai-alert-analyzer
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  arguments:
    parameters:
    - name: instructions
      value: "mcp-grafana, mcp-k8sを使用してKubernetesクラスターの状態を調査し、日本語でレポートを生成してください。"
  
  templates:
  - name: main
    inputs:
      parameters:
      - name: instructions
    steps:
    - - name: analyze-and-report
        template: job-node
        arguments:
          parameters:
          - name: instructions
            value: "{{inputs.parameters.instructions}}"

  - name: job-node
    inputs:
      parameters:
      - name: instructions
    container:
      image: job-generate-report:latest
      command: ["/app/bin"]
      imagePullPolicy: Never
      env:
      - name: AI_SERVICE_ADDRESS
        value: ai-service:80
      - name: REPORT_SERVICE_ADDRESS
        value: report-service:80
      - name: INSTRUCTIONS
        value: "{{inputs.parameters.instructions}}"
