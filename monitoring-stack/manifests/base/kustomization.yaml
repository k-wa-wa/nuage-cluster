apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - mcp/config.yaml
  - mcp/mcp-k8s.yaml
  - mcp/mcp-grafana.yaml
  - mcp/mcp-chart.yaml
  - ai-service.yaml
  - ollama.yaml
  - ollama-pull-job.yaml
  - elasticsearch.yaml
  - report-service.yaml
  - trigger-service.yaml
  - notification-service.yaml
  - workflow-template.yaml
  - grafana-dashboard.yaml
  - ingress.yaml

helmCharts:
- name: kube-prometheus-stack
  releaseName: kube-prometheus-stack
  version: 78.2.1
  repo: https://prometheus-community.github.io/helm-charts
  includeCRDs: true
  valuesFile: helm/prometheus-stack-custom.yaml

- name: loki-stack
  releaseName: loki-stack
  version: 2.10.2
  repo: https://grafana.github.io/helm-charts
  valuesFile: helm/loki-custom.yaml

- name: promtail
  releaseName: promtail
  version: 6.17.0
  repo: https://grafana.github.io/helm-charts
  valuesFile: helm/promtail-custom.yaml
